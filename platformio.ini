; konsumerdevice - board-agnostic display + keyboard library
; Add your board env below and set BOARD_xxx define accordingly.
; Users only need to #include "canvas.h" and/or #include "keyboard.h".

[env]
framework = arduino
platform = https://github.com/pioarduino/platform-espressif32/releases/download/stable/platform-espressif32.zip
upload_speed = 1500000
monitor_speed = 115200
lib_deps =
    moononournation/GFX Library for Arduino@^1.4.9
    https://github.com/PaulStoffregen/XPT2046_Touchscreen
    bblanchon/ArduinoJson@^7.0.0

; plain CYD, uses only internet
[env:cyd]
board = esp32dev
board_build.partitions = huge_app.csv
build_flags =
    -DBOARD_CYD

; use this for simulator
[env:cyd_wokwi]
board = esp32dev
board_build.partitions = huge_app.csv
build_flags =
    -DBOARD_CYD
    -DWOKWI_SIMULATION

; use this for AHTX0 sensor
[env:cyd_AHTX0]
board = esp32dev
board_build.partitions = huge_app.csv
build_flags =
    -DBOARD_CYD
    -DAHTX0
lib_deps =
    ${env.lib_deps}
    https://github.com/adafruit/Adafruit_AHTX0
